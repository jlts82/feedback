<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FeedBack Personalizados - Sistema de Gestión</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="styles.css" rel="stylesheet"/></head>
<body class="bg-gray-50 text-gray-800">
<div class="fixed inset-0 z-[9999] gradient-bg flex items-center justify-center p-4" id="login-screen">
<div class="w-full max-w-md glass rounded-2xl shadow-2xl p-8 fade-in">
<div class="text-center mb-6">
<img src="logo-feedback.jpg" alt="FeedBack Personalizados" class="mx-auto w-56 max-w-full rounded-xl mb-4 bg-white">
<h1 class="text-2xl font-bold text-gray-900">Acceso al sistema</h1>
<p class="text-gray-500 text-sm mt-1">FeedBack Personalizados</p>
<p class="inline-flex items-center gap-2 mt-3 px-3 py-1 rounded-full bg-indigo-50 text-indigo-700 text-xs font-semibold">Versión V16 · Auditoría Supabase Fix</p>
</div>
<form class="space-y-4" id="login-form">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
<input autocomplete="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" id="login-email" placeholder="admin@dominio.com" required="" type="email"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
<input autocomplete="current-password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" id="login-password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition-colors" id="login-submit" type="submit">
        Iniciar sesión
      </button>
<p class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg p-3" id="login-error"></p>
</form>
<div class="mt-5 text-xs text-gray-500 bg-gray-50 rounded-lg p-3">
      Rol administrador: acceso completo. Rol usuario: sin módulo Finanzas ni Administración de usuarios.
    </div>
</div>
</div>

<!-- Notificaciones -->
<div class="fixed top-4 right-4 z-50 space-y-2" id="notifications"></div>
<!-- Sidebar -->
<aside class="sidebar fixed left-0 top-0 h-full w-64 bg-slate-900 text-white z-40 transition-transform duration-300 shadow-2xl" id="sidebar">
<div class="p-4 border-b border-slate-700 flex items-center justify-center">
